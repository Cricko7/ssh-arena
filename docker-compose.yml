services:
  grpc-game:
    build:
      context: .
      dockerfile: Dockerfile
    image: ssh-arena:dev
    command: ["/app/bin/grpc-game"]
    environment:
      GRPC_LISTEN_ADDR: ":9090"
      REDIS_ADDR: "redis:6379"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ssharena
      DB_PASSWORD: ssharena
      DB_NAME: ssharena
    ports:
      - "9090:9090"
    volumes:
      - game-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  ssh-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ssh-arena:dev
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p "$(dirname "$$SSH_HOST_KEY_PATH")"
        if [ ! -f "$$SSH_HOST_KEY_PATH" ]; then
          ssh-keygen -t ed25519 -f "$$SSH_HOST_KEY_PATH" -N '' >/dev/null
        fi
        exec /app/bin/ssh-server
    environment:
      SSH_LISTEN_ADDR: ":2222"
      SSH_HOST_KEY_PATH: "/var/lib/ssh-arena/ssh/ssh_host_ed25519"
      REDIS_ADDR: "redis:6379"
      GRPC_GAME_ADDR: "grpc-game:9090"
      GRPC_PUBLIC_ADDR: "localhost:9090"
    ports:
      - "2222:2222"
    volumes:
      - ssh-host-keys:/var/lib/ssh-arena/ssh
      - game-data:/app/data
    depends_on:
      - grpc-game
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ssharena
      POSTGRES_USER: ssharena
      POSTGRES_PASSWORD: ssharena
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssharena -d ssharena"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  ssh-host-keys:
  game-data:
